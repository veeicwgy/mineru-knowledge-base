    <meta name="keywords" content="MinerU, Agent Skills, 文档解析, PDF解析, RAG, LangChain, LlamaIndex, Dify, Coze, n8n, Tool Calling, 免登录, 双模式, OpenClaw, Nanobot" />
    <link rel="canonical" href="https://mineru.net/ecosystem" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="skills" href="/skills.txt" type="text/plain" />
    <link rel="llms" href="/skills.txt" type="text/plain" />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MinerU Agent Skills",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Cross-platform",
      "description": "MinerU 官方生态中心。提供原生 Agent Skills，深度集成主流 RAG 框架，并通过插件无缝对接工作流平台。",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "免登录极速版，每日 50 万页免费额度"
      },
      "author": {
        "@type": "Organization",
        "name": "OpenDataLab",
        "url": "https://github.com/opendatalab/MinerU"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "需要注册账号才能让 Agent 使用吗？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "不需要。默认支持免登录极速版，每天提供 50 万页免费额度，仅提取基础文本，速度极快。"
          }
        },
        {
          "@type": "Question",
          "name": "如何切换为支持复杂公式和表格的完整版？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "将 Skill 的 mode 参数设为 precise 并传入 API Key，即可结构化输出纯净 Markdown/LaTeX。"
          }
        },
        {
          "@type": "Question",
          "name": "文件超限时 Agent 会怎样处理？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "接口内置面向 Agent 友好的异常处理。文件超限时不会崩溃，而是返回指令引导 Agent 在本地切割后重试。"
          }
        },
        {
          "@type": "Question",
          "name": "如何将自己开发的框架接入 MinerU？",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "核心库和适配器架构完全开源。您可以在 GitHub 获取 MinerU OpenAPI 规范，快速封装到您自己的项目中。"
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
